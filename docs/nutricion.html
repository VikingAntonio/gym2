<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrición y Recetas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <header class="bg-emerald-600 py-32 text-white text-center relative overflow-hidden">
        <div class="container mx-auto px-4 z-10 relative">
            <h1 class="text-7xl font-black mb-6 tracking-tighter uppercase">Nutrición <span class="text-emerald-950">Inteligente</span></h1>
            <p class="text-emerald-100 text-2xl max-w-4xl mx-auto font-light leading-relaxed">
                Recetas profesionales diseñadas para potenciar tu rendimiento y salud.
            </p>
        </div>
        <div class="absolute -top-24 -right-24 w-96 h-96 bg-white/20 rounded-full blur-[100px] animate-pulse"></div>
    </header>

    <main class="container mx-auto px-4 py-20">
        <!-- Advanced Filters -->
        <div class="bg-white rounded-[40px] shadow-sm border border-slate-100 p-8 mb-20 flex flex-wrap gap-6 items-center justify-between">
            <div class="flex flex-wrap gap-4">
                <select id="filter-diet" class="bg-slate-50 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-500 border-none focus:ring-2 focus:ring-emerald-500 transition-all">
                    <option value="All">Dieta: Todas</option>
                    <option value="Keto">Keto</option>
                    <option value="Vegana">Vegana</option>
                    <option value="Alta Proteína">Alta Proteína</option>
                    <option value="Sin Gluten">Sin Gluten</option>
                    <option value="Equilibrada">Equilibrada</option>
                </select>
                <select id="filter-category" class="bg-slate-50 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-500 border-none focus:ring-2 focus:ring-emerald-500 transition-all">
                    <option value="All">Categoría: Todas</option>
                    <option value="Desayuno">Desayuno</option>
                    <option value="Almuerzo">Almuerzo</option>
                    <option value="Cena">Cena</option>
                    <option value="Postre Fitness">Postre</option>
                    <option value="Snack Proteico">Snack</option>
                </select>
            </div>
            <div id="results-count" class="text-[10px] font-black uppercase tracking-widest text-slate-400">Escaneando recetario...</div>
        </div>

        <div id="recipes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <!-- Cargando... -->
        </div>
    </main>

    <!-- Ultra Recipe Modal -->
    <div id="recipe-modal" class="fixed inset-0 bg-slate-950/95 z-[100] hidden items-center justify-center p-4 backdrop-blur-2xl">
        <div class="bg-white w-full max-w-6xl max-h-[95vh] rounded-[60px] overflow-hidden shadow-2xl flex flex-col xl:flex-row border border-white/10 animate-fade-in">
            <div class="xl:w-5/12 h-80 xl:h-auto relative">
                <img id="modal-image" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-12">
                    <span id="modal-category" class="bg-emerald-500 text-white text-[10px] font-black uppercase tracking-[0.2em] px-5 py-2 rounded-2xl w-fit shadow-xl shadow-emerald-900/40 mb-4"></span>
                    <h2 id="modal-title" class="text-5xl font-black text-white leading-[0.9] tracking-tighter"></h2>
                </div>
            </div>
            <div class="xl:w-7/12 p-8 xl:p-16 overflow-y-auto bg-white flex flex-col">
                <div class="flex justify-between items-start mb-12">
                    <div class="grid grid-cols-4 gap-4 w-full mr-12">
                        <div class="bg-slate-50 p-6 rounded-[35px] text-center border border-slate-100 transition-all hover:bg-emerald-50 group">
                            <span id="modal-calories" class="block text-3xl font-black text-emerald-600 group-hover:scale-110 transition-transform"></span>
                            <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Kcal</span>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-[35px] text-center border border-slate-100 transition-all hover:bg-emerald-50 group">
                            <span id="modal-protein" class="block text-3xl font-black text-slate-800 group-hover:scale-110 transition-transform"></span>
                            <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Proteínas</span>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-[35px] text-center border border-slate-100 transition-all hover:bg-emerald-50 group">
                            <span id="modal-carbs" class="block text-3xl font-black text-slate-800 group-hover:scale-110 transition-transform"></span>
                            <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Carbs</span>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-[35px] text-center border border-slate-100 transition-all hover:bg-emerald-50 group">
                            <span id="modal-fats" class="block text-3xl font-black text-slate-800 group-hover:scale-110 transition-transform"></span>
                            <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Grasas</span>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="text-slate-200 hover:text-emerald-500 transition-all text-3xl"><i class="fas fa-times-circle"></i></button>
                </div>

                <div class="space-y-16">
                    <div class="grid md:grid-cols-2 gap-12">
                        <div>
                            <h4 class="text-xl font-black text-slate-800 mb-6 flex items-center uppercase tracking-tighter">
                                <span class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center text-xs mr-3 font-black">01</span> Ingredientes
                            </h4>
                            <div id="modal-ingredients" class="text-slate-600 leading-loose whitespace-pre-wrap pl-6 border-l-2 border-emerald-50 text-sm italic"></div>
                        </div>
                        <div>
                            <h4 class="text-xl font-black text-slate-800 mb-6 flex items-center uppercase tracking-tighter">
                                <span class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center text-xs mr-3 font-black">02</span> Bio-Datos
                            </h4>
                            <div class="space-y-4">
                                <div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center text-xs font-bold uppercase tracking-widest text-slate-400 border border-slate-100">
                                    <span>⏱ Tiempo</span> <span id="modal-time" class="text-slate-900 font-black"></span>
                                </div>
                                <div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center text-xs font-bold uppercase tracking-widest text-slate-400 border border-slate-100">
                                    <span>🔪 Dificultad</span> <span id="modal-difficulty" class="text-emerald-600 font-black"></span>
                                </div>
                                <div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center text-xs font-bold uppercase tracking-widest text-slate-400 border border-slate-100">
                                    <span>🥗 Estilo</span> <span id="modal-diet" class="text-slate-900 font-black"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h4 class="text-xl font-black text-slate-800 mb-8 flex items-center uppercase tracking-tighter">
                            <span class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center text-xs mr-3 font-black">03</span> Preparación Master
                        </h4>
                        <div id="modal-instructions" class="text-slate-600 leading-relaxed whitespace-pre-wrap text-sm bg-slate-50 p-10 rounded-[40px] border border-dashed border-slate-200 border-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, renderNavbar } from './assets/js/utils.js';
        renderNavbar();

        const grid = document.getElementById('recipes-grid');
        const modal = document.getElementById('recipe-modal');
        let allRecipes = [];

        async function loadRecipes() {
            const params = new URLSearchParams(window.location.search);
            const domain = params.get('domain');

            let query = supabase.from('gym_recipes').select('*').order('created_at', { ascending: false });

            if (domain) {
                // Fetch owner_id for this domain
                const { data: userData, error: userError } = await supabase.from('wisbe_users')
                    .select('id')
                    .ilike('domain', domain.trim())
                    .eq('role', 'gym-owner')
                    .maybeSingle();

                if (userData) {
                    query = query.eq('owner_id', userData.id);
                } else {
                    grid.innerHTML = '<div class="col-span-full text-center text-slate-500 font-bold py-20">Gimnasio no encontrado para el dominio especificado.</div>';
                    document.getElementById('results-count').innerText = '0 Opciones Maestro';
                    return;
                }
            }

            const { data, error } = await query;
            if (error) return;
            allRecipes = data;
            filterRecipes();
        }

        function filterRecipes() {
            const diet = document.getElementById('filter-diet').value;
            const category = document.getElementById('filter-category').value;

            const filtered = allRecipes.filter(r => {
                return (diet === 'All' || r.diet_type === diet) &&
                       (category === 'All' || r.category === category);
            });

            document.getElementById('results-count').innerText = `${filtered.length} Opciones Maestro`;
            renderGrid(filtered);
        }

        function renderGrid(data) {
            grid.innerHTML = data.map(r => `
                <div class="bg-white rounded-[50px] shadow-sm border border-slate-50 overflow-hidden group hover:shadow-2xl hover:-translate-y-3 transition-all duration-700 animate-fade-in">
                    <div class="h-64 relative overflow-hidden bg-slate-200">
                        <img src="${r.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=600'}"
                             class="w-full h-full object-cover group-hover:scale-125 transition duration-1000 grayscale-[0.2] group-hover:grayscale-0">
                        <div class="absolute top-6 left-6">
                            <span class="bg-white/95 backdrop-blur-md px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest text-emerald-600 shadow-2xl">${r.category}</span>
                        </div>
                    </div>
                    <div class="p-10">
                        <h3 class="text-2xl font-black text-slate-800 mb-6 tracking-tight line-clamp-1">${r.title}</h3>
                        <div class="flex justify-between items-center mb-10 border-t border-b border-slate-50 py-6 text-[10px] font-black uppercase tracking-widest text-slate-400">
                            <div class="text-center">
                                <span class="block text-2xl font-black text-emerald-600 mb-1">${r.calories || 0}</span>
                                <span>Kcal</span>
                            </div>
                            <div class="text-center">
                                <span class="block text-2xl font-black text-slate-800 mb-1">${r.protein || 0}g</span>
                                <span>Prote</span>
                            </div>
                        </div>
                        <button onclick='openModal(${JSON.stringify(r).replace(/'/g, "&apos;")})'
                                class="w-full py-5 bg-slate-900 hover:bg-emerald-600 text-white font-black rounded-3xl transition-all shadow-xl hover:shadow-emerald-200 uppercase tracking-widest text-xs">
                            Receta Master
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.openModal = (r) => {
            document.getElementById('modal-title').innerText = r.title;
            document.getElementById('modal-category').innerText = r.category;
            document.getElementById('modal-calories').innerText = r.calories || 0;
            document.getElementById('modal-protein').innerText = r.protein || 0;
            document.getElementById('modal-carbs').innerText = r.carbs || 0;
            document.getElementById('modal-fats').innerText = r.fats || 0;
            document.getElementById('modal-time').innerText = r.prep_time || '20 min';
            document.getElementById('modal-difficulty').innerText = r.difficulty || 'Media';
            document.getElementById('modal-diet').innerText = r.diet_type || 'Equilibrada';
            document.getElementById('modal-ingredients').innerText = r.ingredients || 'Secretos culinarios no especificados.';
            document.getElementById('modal-instructions').innerText = r.instructions || 'Sigue los instintos maestros de un chef fitness.';
            document.getElementById('modal-image').src = r.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=800';

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        window.closeModal = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        ['filter-diet', 'filter-category'].forEach(id => {
            document.getElementById(id).addEventListener('change', filterRecipes);
        });

        loadRecipes();
    </script>
</body>
</html>
